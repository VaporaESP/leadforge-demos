<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadForge Demos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.wrap{max-width:560px;width:100%}
.logo{font-size:2.8rem;font-weight:900;letter-spacing:-.03em;margin-bottom:.4rem}
.logo span{color:#6366f1}
.sub{color:rgba(255,255,255,.45);font-size:1rem;margin-bottom:2.5rem}
.badge{display:inline-block;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#818cf8;font-size:.75rem;font-weight:600;padding:.3rem .9rem;border-radius:20px;margin-bottom:2rem;letter-spacing:.05em;text-transform:uppercase}
.info{background:#111;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:2rem;font-size:.9rem;color:rgba(255,255,255,.45);line-height:1.8}
.info strong{color:rgba(255,255,255,.7)}
.footer{margin-top:2.5rem;font-size:.75rem;color:rgba(255,255,255,.15)}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">Sistema privado</div>
  <div class="logo">Lead<span>Forge</span></div>
  <div class="sub">Motor de demos personalizadas para agencia web</div>
  <div class="info">
    Las demos se generan <strong>automáticamente</strong> para cada prospecto.<br>
    Cada URL tiene la forma <strong>/nombre-empresa-ciudad</strong><br>
    y se activa al procesar un lead desde el panel.
  </div>
  <div class="footer">LeadForge &mdash; Sistema interno &mdash; 2025</div>
</div>
</body>
</html>
